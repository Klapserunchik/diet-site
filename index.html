<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1500 · Питание в Ереване</title>
<style>
:root{
  --bg:#ffffff;
  --bg-soft:#f7faf8;
  --green-50:#eef8f1;
  --green-100:#dcf1e3;
  --green-300:#a9e0bb;
  --green-500:#5cbf7f;
  --green-600:#3fa668;
  --green-700:#2f8555;
  --ink:#1c2521;
  --ink-soft:#5c6b63;
  --line:#e6ede9;
  --red:#e2745a;
  --amber:#d9a441;
  --shadow: 0 2px 10px rgba(28,37,33,0.06), 0 1px 2px rgba(28,37,33,0.04);
  --shadow-lg: 0 12px 32px rgba(28,37,33,0.10);
  --radius: 18px;
}
html[data-theme="dark"]{
  --bg:#161c19;
  --bg-soft:#101512;
  --green-50:#1b2a22;
  --green-100:#213626;
  --green-300:#2f5a3f;
  --green-500:#4fb377;
  --green-600:#5cc986;
  --green-700:#7fe0a4;
  --ink:#eaf1ec;
  --ink-soft:#93a49a;
  --line:#28332d;
  --red:#e2745a;
  --amber:#d9a441;
  --shadow: 0 2px 10px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-soft);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  padding-bottom: 84px;
  transition: background .2s ease, color .2s ease;
}
h1,h2,h3,h4{margin:0; font-weight:700; letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit;}
::selection{background:var(--green-300);}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background: var(--topbar-bg, rgba(255,255,255,0.92));
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
  padding: 14px 18px;
  display:flex; align-items:center; justify-content:space-between;
}
.topbar-actions{display:flex; align-items:center; gap:8px;}
.theme-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--line);
  background:var(--green-50); display:flex;align-items:center;justify-content:center;
  cursor:pointer; color:var(--green-700);
}
.theme-btn svg{width:18px;height:18px;}
.theme-btn .icon-moon{display:none;}
html[data-theme="dark"] .theme-btn .icon-sun{display:none;}
html[data-theme="dark"] .theme-btn .icon-moon{display:block;}
html[data-theme="dark"]{ --topbar-bg: rgba(22,28,25,0.92); --tabbar-bg: rgba(22,28,25,0.94); }
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background: linear-gradient(135deg, var(--green-500), var(--green-700));
  display:flex;align-items:center;justify-content:center;
  color:white; font-weight:800; font-size:14px;
}
.brand-title{font-size:16px; font-weight:800;}
.brand-sub{font-size:11px; color:var(--ink-soft); margin-top:-2px;}
.search-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--line);
  background:var(--green-50); display:flex;align-items:center;justify-content:center;
  cursor:pointer; color:var(--green-700);
}

/* ---------- Container ---------- */
.container{max-width:720px; margin:0 auto; padding:16px;}
.screen{display:none; animation: fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Cards ---------- */
.card{
  background:var(--bg); border-radius:var(--radius); box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.section-title{font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700; margin: 22px 4px 10px;}
.section-title:first-child{margin-top:4px;}

/* ---------- Today screen ---------- */
.today-hero{
  padding:22px; margin-bottom:16px;
  background: linear-gradient(160deg, var(--green-50), var(--bg) 70%);
}
.ring-wrap{display:flex; align-items:center; gap:20px;}
.ring{position:relative; width:118px; height:118px; flex-shrink:0;}
.ring svg{transform:rotate(-90deg);}
.ring-track{fill:none; stroke:var(--green-100); stroke-width:12;}
.ring-progress{fill:none; stroke:var(--green-500); stroke-width:12; stroke-linecap:round; transition:stroke-dashoffset .5s ease, stroke .3s ease;}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.ring-num{font-size:26px; font-weight:800; line-height:1;}
.ring-label{font-size:11px; color:var(--ink-soft); margin-top:2px;}
.today-stats{flex:1;}
.today-stats h2{font-size:20px; margin-bottom:6px;}
.today-stats .muted{color:var(--ink-soft); font-size:13.5px; line-height:1.5;}

.meal-plan{padding:16px; margin-bottom:14px;}
.meal-plan-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.meal-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 4px; border-bottom:1px solid var(--line);
}
.meal-row:last-child{border-bottom:none;}
.meal-row-left{display:flex; align-items:center; gap:12px;}
.meal-dot{width:10px;height:10px;border-radius:50%; background:var(--green-400, var(--green-500));}
.meal-name{font-size:14.5px; font-weight:600;}
.meal-target{font-size:12px; color:var(--ink-soft);}
.meal-eaten{font-size:13px; font-weight:700; color:var(--green-700);}
.add-log-btn{
  width:100%; padding:14px; border-radius:14px; border:none; margin-top:6px;
  background: var(--green-500); color:white; font-weight:700; font-size:14.5px;
  cursor:pointer; box-shadow: 0 6px 16px rgba(92,191,127,.35);
}
.add-log-btn:active{transform:scale(.98);}
.log-list{padding:16px;}
.log-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);}
.log-item:last-child{border-bottom:none;}
.log-item-name{font-size:14px; font-weight:600;}
.log-item-meta{font-size:12px; color:var(--ink-soft);}
.log-item-kcal{font-weight:700; font-size:14px;}
.remove-x{color:var(--red); font-size:18px; cursor:pointer; margin-left:10px; line-height:1;}
.empty-hint{color:var(--ink-soft); font-size:13.5px; text-align:center; padding:18px 6px;}

/* ---------- Tabs / nav ---------- */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:60;
  background:var(--tabbar-bg, rgba(255,255,255,0.94)); backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex; padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
}
.tab-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; padding:8px 2px; cursor:pointer;
  color:var(--ink-soft); font-size:10.5px; font-weight:600; border-radius:12px;
}
.tab-btn.active{color:var(--green-700);}
.tab-btn svg{width:21px; height:21px;}

/* ---------- Filters ---------- */
.filter-bar{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{
  white-space:nowrap; padding:9px 14px; border-radius:999px; border:1px solid var(--line);
  background:var(--bg); font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  flex-shrink:0;
}
.chip.active{background:var(--green-500); border-color:var(--green-500); color:white;}
.search-input-wrap{position:relative; margin-bottom:12px;}
.search-input{
  width:100%; padding:13px 16px 13px 42px; border-radius:14px; border:1px solid var(--line);
  background:var(--bg); font-size:14.5px; outline:none;
}
.search-input:focus{border-color:var(--green-500);}
.search-icon{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--ink-soft);}

/* ---------- Place cards ---------- */
.place-card{padding:16px; margin-bottom:12px; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease;}
.place-card:active{transform:scale(.985);}
.place-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.place-name{font-size:16px; font-weight:700;}
.place-cat{font-size:12px; color:var(--green-700); font-weight:600; margin-top:1px;}
.fav-btn{
  border:none; background:none; cursor:pointer; color:var(--ink-soft); flex-shrink:0; padding:4px;
}
.fav-btn.active{color:var(--red);}
.place-addr{font-size:13px; color:var(--ink-soft); margin-top:8px; display:flex; gap:6px; align-items:flex-start;}
.place-meta{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;}
.meta-tag{
  font-size:11.5px; background:var(--green-50); color:var(--green-700); font-weight:600;
  padding:5px 10px; border-radius:999px;
}
.meta-tag.dist{background:var(--bg-soft); color:var(--ink-soft);}
.place-bottom{display:flex; justify-content:space-between; align-items:center; margin-top:12px;}
.stars{color:var(--amber); font-size:13px; font-weight:700;}
.price-range{font-size:13px; color:var(--ink-soft); font-weight:600;}

/* ---------- Detail screen ---------- */
.detail-header{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.back-btn{
  width:36px;height:36px;border-radius:11px; border:1px solid var(--line); background:var(--bg);
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
}
.detail-links{display:flex; gap:10px; margin-top:14px;}
.link-btn{
  flex:1; text-align:center; padding:12px; border-radius:12px; text-decoration:none; font-weight:700; font-size:13.5px;
  border:1px solid var(--line); color:var(--ink);
}
.link-btn.primary{background:var(--green-500); color:white; border-color:var(--green-500);}

.dish-card{
  display:flex; justify-content:space-between; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line);
}
.dish-card:last-child{border-bottom:none;}
.dish-name{font-size:14.5px; font-weight:700;}
.dish-macros{font-size:12px; color:var(--ink-soft); margin-top:4px;}
.dish-badge{font-size:12px; margin-top:6px; font-weight:700;}
.dish-right{display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;}
.dish-kcal{font-size:15px; font-weight:800; color:var(--green-700);}
.dish-price{font-size:12px; color:var(--ink-soft);}
.dish-actions{display:flex; gap:6px;}
.icon-btn{
  width:30px;height:30px; border-radius:9px; border:1px solid var(--line); background:var(--bg);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-soft);
}
.icon-btn.active{color:var(--red); border-color:var(--red);}
.icon-btn.add{color:var(--green-700);}

/* ---------- Product grid ---------- */
.product-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.product-card{padding:13px; display:flex; flex-direction:column; gap:6px;}
.product-name{font-size:13.5px; font-weight:700; line-height:1.25;}
.product-store{font-size:11px; color:var(--green-700); font-weight:600;}
.product-macros{font-size:11px; color:var(--ink-soft); line-height:1.5;}
.product-bottom{display:flex; justify-content:space-between; align-items:center; margin-top:4px;}
.product-price{font-size:12.5px; font-weight:700;}
.product-kcal{font-size:12.5px; font-weight:800; color:var(--green-700);}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,28,24,0.45); z-index:100;
  display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg); width:100%; max-width:560px; border-radius:22px 22px 0 0;
  padding:20px; max-height:82vh; overflow-y:auto;
  animation: slideup .25s ease;
}
@keyframes slideup{from{transform:translateY(30px); opacity:.6;} to{transform:translateY(0); opacity:1;}}
.modal-handle{width:38px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 16px;}
.modal-title{font-size:18px; margin-bottom:14px;}
.meal-pick{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
.meal-pick-btn{
  padding:14px; border-radius:14px; border:1.5px solid var(--line); background:var(--bg);
  font-weight:700; font-size:13.5px; cursor:pointer; text-align:left;
}
.meal-pick-btn.sel{border-color:var(--green-500); background:var(--green-50); color:var(--green-700);}
.modal-search-list{max-height:300px; overflow-y:auto; margin-top:10px;}
.modal-row{display:flex; justify-content:space-between; align-items:center; padding:11px 4px; border-bottom:1px solid var(--line); cursor:pointer;}
.modal-row:hover{background:var(--green-50);}
.modal-row-name{font-size:13.5px; font-weight:600;}
.modal-row-meta{font-size:11.5px; color:var(--ink-soft);}
.modal-close-btn{
  width:100%; padding:14px; border-radius:14px; border:none; margin-top:14px;
  background:var(--bg-soft); color:var(--ink); font-weight:700; font-size:14px; cursor:pointer;
}

.empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
.empty-state svg{margin-bottom:12px; opacity:.4;}
.empty-state p{font-size:14px;}

.hidden{display:none !important;}
.toast{
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:white; padding:11px 18px; border-radius:12px; font-size:13.5px;
  z-index:200; box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

@media (min-width:560px){
  .product-grid{grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">1500</div>
    <div>
      <div class="brand-title">Питание в Ереване</div>
      <div class="brand-sub">AUA · Ordo Learning Hub</div>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Переключить тему">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.5 12H2M22 12h-2.5M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 019.5 4a8.5 8.5 0 1010.5 10.5z"/></svg>
    </button>
    <button class="search-btn" onclick="goTab('search')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</div>

<div class="container">

  <!-- SEGODNYA -->
  <div class="screen active" id="screen-today">
    <div class="card today-hero">
      <div class="ring-wrap">
        <div class="ring">
          <svg width="118" height="118" viewBox="0 0 118 118">
            <circle class="ring-track" cx="59" cy="59" r="50"></circle>
            <circle class="ring-progress" id="ringProgress" cx="59" cy="59" r="50" stroke-dasharray="314" stroke-dashoffset="314"></circle>
          </svg>
          <div class="ring-center">
            <div class="ring-num" id="ringNum">1500</div>
            <div class="ring-label">осталось</div>
          </div>
        </div>
        <div class="today-stats">
          <h2>Сегодня</h2>
          <p class="muted" id="todaySummary">Съедено 0 из 1500 ккал</p>
        </div>
      </div>
    </div>

    <div class="card meal-plan">
      <div class="meal-plan-head">
        <h3 style="font-size:15px;">План на день</h3>
        <span style="font-size:12px; color:var(--ink-soft);">≈1500 ккал</span>
      </div>
      <div id="mealPlanList"></div>
      <button class="add-log-btn" onclick="openLogModal()">+ Записать приём пищи</button>
    </div>

    <div class="section-title">Съедено сегодня</div>
    <div class="card log-list" id="logList"></div>
  </div>

  <!-- KARTA -->
  <div class="screen" id="screen-map">
    <div class="search-input-wrap">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" placeholder="Кафе, блюдо, район..." id="mapSearch" oninput="renderPlaces()">
    </div>
    <div class="filter-bar" id="mapFilters"></div>
    <div id="placesList"></div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="goTab('map')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h3 id="detailName" style="font-size:18px;"></h3>
    </div>
    <div id="detailCardWrap"></div>
    <div class="section-title">Что можно заказать</div>
    <div class="card" id="detailDishes"></div>
  </div>

  <!-- MAGAZINY -->
  <div class="screen" id="screen-shops">
    <div class="search-input-wrap">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" placeholder="Продукт..." id="shopSearch" oninput="renderProducts()">
    </div>
    <div class="filter-bar" id="shopFilters"></div>
    <div class="product-grid" id="productsGrid"></div>
  </div>


  <!-- SEARCH (global) -->
  <div class="screen" id="screen-search">
    <div class="search-input-wrap">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" placeholder="Искать блюда, кафе, продукты..." id="globalSearch" oninput="renderGlobalSearch()" autofocus>
    </div>
    <div id="globalResults"></div>
  </div>

  <!-- FAVORITES -->
  <div class="screen" id="screen-fav">
    <div class="section-title">Любимые блюда и места</div>
    <div id="favList"></div>
  </div>

</div>

<div class="tabbar">
  <button class="tab-btn active" data-tab="today" onclick="goTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Сегодня
  </button>
  <button class="tab-btn" data-tab="map" onclick="goTab('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg>
    Карта еды
  </button>
  <button class="tab-btn" data-tab="shops" onclick="goTab('shops')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1-5h16l1 5"/><path d="M4 9v10h16V9"/><path d="M9 21v-6h6v6"/></svg>
    Магазины
  </button>
  <button class="tab-btn" data-tab="fav" onclick="goTab('fav')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
    Избранное
  </button>
</div>

<div class="modal-overlay" id="logModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 class="modal-title">Что вы съели?</h3>
    <div class="meal-pick" id="mealPickWrap"></div>
    <input class="search-input" id="logSearchInput" placeholder="Поиск блюда или продукта..." oninput="renderLogSearch()">
    <div class="modal-search-list" id="logSearchList"></div>
    <button class="modal-close-btn" onclick="closeLogModal()">Закрыть</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ДАННЫЕ
   Все места — реальные заведения рядом с AUA (просп. Баграмяна 40)
   и Ordo Learning Hub (ул. Амиряна 4/6), Ереван.
   Расстояния — расчётные (по прямой + поправка на пешую сеть улиц), ккал/БЖУ блюд —
   приблизительные оценки на основе типового состава блюда, если точных данных нет.

/* =========================================================
   STATE (localStorage)
   ========================================================= */
function todayKey(){ return "log_"+new Date().toISOString().slice(0,10); }
function loadLog(){ try{ return JSON.parse(localStorage.getItem(todayKey())||"[]"); }catch(e){ return []; } }
function saveLog(log){ localStorage.setItem(todayKey(), JSON.stringify(log)); }
function loadFavs(){ try{ return JSON.parse(localStorage.getItem("favs")||"[]"); }catch(e){ return []; } }
function saveFavs(f){ localStorage.setItem("favs", JSON.stringify(f)); }

/* =========================================================
   THEME
   ========================================================= */
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
}
function toggleTheme(){
  const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(current === "dark" ? "light" : "dark");
}
applyTheme(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

/* =========================================================
   NAV
   ========================================================= */
function goTab(tab){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const map = {today:"screen-today", map:"screen-map", shops:"screen-shops", fav:"screen-fav", search:"screen-search", detail:"screen-detail"};
  document.getElementById(map[tab]).classList.add("active");
  const btn = document.querySelector('.tab-btn[data-tab="'+tab+'"]');
  if(btn) btn.classList.add("active");
  if(tab==="map") renderPlaces();
  if(tab==="shops") renderProducts();
  if(tab==="fav") renderFavorites();
  if(tab==="search"){ setTimeout(()=>document.getElementById("globalSearch").focus(), 50); }
  window.scrollTo(0,0);
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}

/* =========================================================
   TODAY
   ========================================================= */
function renderToday(){
  const log = loadLog();
  const eaten = log.reduce((s,x)=>s+x.kcal,0);
  const remain = Math.max(0, DAILY_TARGET - eaten);

  document.getElementById("ringNum").textContent = remain;
  document.getElementById("todaySummary").textContent = `Съедено ${eaten} из ${DAILY_TARGET} ккал`;

  const circumference = 314;
  const ratio = Math.min(1, eaten/DAILY_TARGET);
  const offset = circumference * (1-ratio);
  const ring = document.getElementById("ringProgress");
  ring.setAttribute("stroke-dashoffset", offset);
  ring.style.stroke = eaten > DAILY_TARGET ? "var(--red)" : "var(--green-500)";

  const planWrap = document.getElementById("mealPlanList");
  planWrap.innerHTML = MEALS.map(m=>{
    const eatenForMeal = log.filter(x=>x.meal===m.key).reduce((s,x)=>s+x.kcal,0);
    return `<div class="meal-row">
      <div class="meal-row-left">
        <div class="meal-dot"></div>
        <div>
          <div class="meal-name">${m.name}</div>
          <div class="meal-target">план ≈ ${m.target} ккал</div>
        </div>
      </div>
      <div class="meal-eaten">${eatenForMeal ? eatenForMeal+" ккал" : "—"}</div>
    </div>`;
  }).join("");

  const logWrap = document.getElementById("logList");
  if(log.length===0){
    logWrap.innerHTML = `<div class="empty-hint">Пока ничего не записано. Нажмите «Записать приём пищи», чтобы начать день.</div>`;
  } else {
    logWrap.innerHTML = log.map((item,idx)=>`
      <div class="log-item">
        <div>
          <div class="log-item-name">${item.name}</div>
          <div class="log-item-meta">${MEALS.find(m=>m.key===item.meal)?.name||""} · ${item.source||""}</div>
        </div>
        <div style="display:flex; align-items:center;">
          <div class="log-item-kcal">${item.kcal} ккал</div>
          <span class="remove-x" onclick="removeLogItem(${idx})">×</span>
        </div>
      </div>
    `).join("");
  }
}
function removeLogItem(idx){
  const log = loadLog();
  log.splice(idx,1);
  saveLog(log);
  renderToday();
}

/* Log modal */
function openLogModal(mealKey){
  currentMealPick = mealKey || "lunch";
  const wrap = document.getElementById("mealPickWrap");
  wrap.innerHTML = MEALS.map(m=>`<button class="meal-pick-btn ${m.key===currentMealPick?'sel':''}" onclick="pickMeal('${m.key}')">${m.name}<br><span style="font-weight:400; color:var(--ink-soft); font-size:11.5px;">≈${m.target} ккал</span></button>`).join("");
  document.getElementById("logSearchInput").value = "";
  renderLogSearch();
  document.getElementById("logModalOverlay").classList.add("open");
}
function pickMeal(key){
  currentMealPick = key;
  document.querySelectorAll(".meal-pick-btn").forEach(b=>b.classList.remove("sel"));
  openLogModal(key);
}
function closeLogModal(){
  document.getElementById("logModalOverlay").classList.remove("open");
}
function renderLogSearch(){
  const q = document.getElementById("logSearchInput").value.toLowerCase().trim();
  const list = document.getElementById("logSearchList");
  let items = [];
  DISHES.forEach(d=> items.push({name:d.name, kcal:d.kcal, p:d.p, f:d.f, c:d.c, source:d.cafeName}));
  PRODUCTS.forEach(p=> items.push({name:p.name, kcal:p.kcal, p:p.p, f:p.f, c:p.c, source:p.store}));
  if(q) items = items.filter(x=>x.name.toLowerCase().includes(q));
  items = items.slice(0,60);
  list.innerHTML = items.map(it=>`
    <div class="modal-row" onclick='addLogItem(${JSON.stringify(it).replace(/'/g,"&#39;")})'>
      <div>
        <div class="modal-row-name">${it.name}</div>
        <div class="modal-row-meta">${it.source} · Б${it.p} Ж${it.f} У${it.c}</div>
      </div>
      <div style="font-weight:800; color:var(--green-700);">${it.kcal}</div>
    </div>
  `).join("") || `<div class="empty-hint">Ничего не найдено</div>`;
}
function addLogItem(item){
  const log = loadLog();
  log.push({name:item.name, kcal:item.kcal, p:item.p, f:item.f, c:item.c, source:item.source, meal:currentMealPick});
  saveLog(log);
  renderToday();
  closeLogModal();
  showToast("Добавлено: "+item.name);
}

let activeMapFilter = "all";

function renderMapFilters(){
  const wrap = document.getElementById("mapFilters");

function setMapFilter(key){ activeMapFilter = key; renderMapFilters(); renderPlaces(); }

function bestFitStars(cafe){
  const avg = cafe.dishes.reduce((s,d)=>s+d.fit,0)/cafe.dishes.length;
  return avg;
}

function renderPlaces(){
  renderMapFilters();
  const q = document.getElementById("mapSearch").value.toLowerCase().trim();
  let list = CAFES.slice();

  if(activeMapFilter==="aua") list = list.filter(c=> parseFloat(c.auaDist) <= 0.6);
  if(activeMapFilter==="ordo") list = list.filter(c=> parseFloat(c.ordoDist) <= 0.6);
  if(activeMapFilter==="cheap") list = list.filter(c=> c.price==="$" || c.price==="$$");
  if(activeMapFilter==="healthy") list = list.filter(c=> bestFitStars(c) >= 4);

  if(q){
    list = list.filter(c=> c.name.toLowerCase().includes(q) || c.category.toLowerCase().includes(q) || c.dishes.some(d=>d.name.toLowerCase().includes(q)));
  }

  const favs = loadFavs();
  const wrap = document.getElementById("placesList");
  if(list.length===0){
    wrap.innerHTML = `<div class="empty-state"><p>Ничего не найдено. Попробуйте другой запрос.</p></div>`;
    return;
  }
  wrap.innerHTML = list.map(c=>{
    const isFav = favs.includes("cafe-"+c.id);
    return `<div class="card place-card" onclick="openDetail('${c.id}')">
      <div class="place-top">
        <div>
          <div class="place-name">${c.name}</div>
          <div class="place-cat">${c.category}</div>
        </div>
        <button class="fav-btn ${isFav?'active':''}" onclick="event.stopPropagation(); toggleFav('cafe-${c.id}')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
        </button>
      </div>
      <div class="place-addr">📍 ${c.address}</div>
      <div class="place-meta">
        <span class="meta-tag dist">от AUA: ${c.auaDist}</span>
        <span class="meta-tag dist">от Ordo: ${c.ordoDist}</span>
      </div>
      <div class="place-bottom">
        <span class="stars">${c.rating?`★ ${c.rating}`:"на кампусе AUA"}</span>
        <span class="price-range">${c.price}</span>
      </div>

  }).join("");
}

function fitLabel(fit){
  const stars = "★".repeat(fit)+"☆".repeat(5-fit);
  const labels = {5:"идеально", 4:"хорошо", 3:"иногда", 2:"редко", 1:"лучше не брать"};
  return `<span style="color:${fit>=4?'var(--green-600)':fit===3?'var(--amber)':'var(--red)'}">${stars} ${labels[fit]}</span>`;
}

function renderDishRow(d){
  const favs = loadFavs();
  const isFav = favs.includes("dish-"+d.id);
  return `<div class="dish-card">
    <div>
      <div class="dish-name">${d.name}</div>
      <div class="dish-macros">Б ${d.p} г · Ж ${d.f} г · У ${d.c} г${d.price?` · ${d.price} ֏`:""}</div>
      <div class="dish-badge">${fitLabel(d.fit)}</div>
    </div>
    <div class="dish-right">
      <div class="dish-kcal">${d.kcal}</div>
      <div class="dish-actions">
        <button class="icon-btn ${isFav?'active':''}" onclick='toggleFav("dish-${d.id}"); this.closest(".dish-card").querySelector(".dish-actions .icon-btn").classList.toggle("active")'>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2.4"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
        </button>
        <button class="icon-btn add" onclick='quickAdd(${JSON.stringify({name:d.name,kcal:d.kcal,p:d.p,f:d.f,c:d.c,source:d.cafeName}).replace(/'/g,"&#39;")})'>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}
function quickAdd(item){
  const log = loadLog();
  log.push({...item, meal:"lunch"});
  saveLog(log);
  showToast("Добавлено в «Сегодня»: "+item.name);
}

/* =========================================================
   FAVORITES
   ========================================================= */
function toggleFav(key){
  let favs = loadFavs();
  if(favs.includes(key)) favs = favs.filter(f=>f!==key);
  else favs.push(key);
  saveFavs(favs);
  if(document.getElementById("screen-map").classList.contains("active")) renderPlaces();
  if(document.getElementById("screen-fav").classList.contains("active")) renderFavorites();
}
function renderFavorites(){
  const favs = loadFavs();
  const wrap = document.getElementById("favList");
  if(favs.length===0){
    wrap.innerHTML = `<div class="empty-state"><p>Пока нет избранного.<br>Нажимайте ♡ на карточках блюд и кафе.</p></div>`;
    return;
  }
  let html = "";
  const favCafes = favs.filter(f=>f.startsWith("cafe-")).map(f=>CAFES.find(c=>c.id===f.slice(5))).filter(Boolean);
  const favDishIds = favs.filter(f=>f.startsWith("dish-")).map(f=>f.slice(5));
  const favDishes = DISHES.filter(d=>favDishIds.includes(d.id));

  if(favCafes.length){
    html += `<div class="section-title">Места</div>`;
    html += favCafes.map(c=>`<div class="card place-card" onclick="openDetail('${c.id}')">
      <div class="place-top">
        <div><div class="place-name">${c.name}</div><div class="place-cat">${c.category}</div></div>
        <button class="fav-btn active" onclick="event.stopPropagation(); toggleFav('cafe-${c.id}')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
        </button>
      </div>
      <div class="place-addr">📍 ${c.address}</div>
    </div>`).join("");
  }
  if(favDishes.length){
    html += `<div class="section-title">Блюда</div><div class="card">`;
    html += favDishes.map(d=>renderDishRow(d)).join("");
    html += `</div>`;
  }
  wrap.innerHTML = html;
}

/* =========================================================
   SHOPS
   ========================================================= */
/* Ближайшие филиалы сетей к AUA (учёба) и Ordo Learning Hub (работа).
   Ориентировочные данные — при необходимости уточните под реальные адреса филиалов. */
const STORE_LOCATIONS = {
  "Yerevan City": {nearStudy:true,  nearWork:true},
  "SAS":          {nearStudy:true,  nearWork:false},
  "Parma":        {nearStudy:false, nearWork:true},
  "Evrika":       {nearStudy:true,  nearWork:true},
};

let activeShopFilter = "all";
const SHOP_FILTER_DEFS = [
  {key:"all", label:"Все"},
  {key:"nearStudy", label:"Рядом с учёбой"},
  {key:"nearWork", label:"Рядом с работой"},
  {key:"Yerevan City", label:"Yerevan City"},
  {key:"SAS", label:"SAS"},
  {key:"Parma", label:"Parma"},
  {key:"Evrika", label:"Evrika"},
  {key:"protein", label:"Белок 20 г+"},
];
function renderShopFilters(){
  document.getElementById("shopFilters").innerHTML = SHOP_FILTER_DEFS.map(f=>`<button class="chip ${f.key===activeShopFilter?'active':''}" onclick="setShopFilter('${f.key}')">${f.label}</button>`).join("");
}
function setShopFilter(key){ activeShopFilter = key; renderShopFilters(); renderProducts(); }

function renderProducts(){
  renderShopFilters();
  const q = document.getElementById("shopSearch").value.toLowerCase().trim();
  let list = PRODUCTS.slice();
  const specialFilters = ["all","nearStudy","nearWork","protein"];
  if(activeShopFilter==="nearStudy") list = list.filter(p=> STORE_LOCATIONS[p.store]?.nearStudy);
  if(activeShopFilter==="nearWork") list = list.filter(p=> STORE_LOCATIONS[p.store]?.nearWork);
  if(!specialFilters.includes(activeShopFilter)) list = list.filter(p=>p.store===activeShopFilter);
  if(activeShopFilter==="protein") list = list.filter(p=>p.p>=20);
  if(q) list = list.filter(p=>p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));

  const wrap = document.getElementById("productsGrid");
  if(list.length===0){ wrap.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><p>Ничего не найдено</p></div>`; return; }
  wrap.innerHTML = list.map(p=>`
    <div class="card product-card">
      <div>
        <div class="product-store">${p.store}</div>
        <div class="product-name">${p.name}</div>
      </div>
      <div class="product-macros">Б${p.p} · Ж${p.f} · У${p.c} (на весь объём)</div>
      <div class="product-bottom">
        <span class="product-price">${p.price} ֏</span>
        <span class="product-kcal">${p.kcal} ккал</span>
      </div>
    </div>
  `).join("");
}

/* =========================================================
   GLOBAL SEARCH
   ========================================================= */
function renderGlobalSearch(){
  const q = document.getElementById("globalSearch").value.toLowerCase().trim();
  const wrap = document.getElementById("globalResults");
  if(!q){ wrap.innerHTML = `<div class="empty-state"><p>Начните вводить название блюда, кафе или продукта</p></div>`; return; }

  const dishMatches = DISHES.filter(d=>d.name.toLowerCase().includes(q) || d.cafeName.toLowerCase().includes(q)).slice(0,20);
  const prodMatches = PRODUCTS.filter(p=>p.name.toLowerCase().includes(q)).slice(0,10);

  let html = "";
  if(dishMatches.length){
    html += `<div class="section-title">Блюда</div><div class="card">` + dishMatches.map(d=>renderDishRow(d)).join("") + `</div>`;
  }
  if(prodMatches.length){
    html += `<div class="section-title">Продукты</div><div class="product-grid">` + prodMatches.map(p=>`
      <div class="card product-card">
        <div><div class="product-store">${p.store}</div><div class="product-name">${p.name}</div></div>
        <div class="product-macros">Б${p.p} · Ж${p.f} · У${p.c}</div>
        <div class="product-bottom"><span class="product-price">${p.price} ֏</span><span class="product-kcal">${p.kcal} ккал</span></div>
      </div>`).join("") + `</div>`;
  }
  if(!dishMatches.length && !prodMatches.length){
    html = `<div class="empty-state"><p>Ничего не найдено по запросу «${q}»</p></div>`;
  }
  wrap.innerHTML = html;
}
